metadata:
  template_id: "yageo_mlcc"
  name: "YAGEO Material Composition Declaration"
  version: "1.0.0"
  description: "YAGEO material composition declaration with Content(mg)"
  author: "Material Extractor Team"
  source_type: "pdf"
  page_indices: [0]
  detection_method: "keyword_match"
  detection_keywords:
    - "YAGEO"
    - "Material Composition Declaration"
    - "Content(mg)"
  header_keywords:
    - "Part"
    - "Substance"
    - "CAS"
    - "Content"
  validation_rules:
    min_rows: 2
    min_cols: 4
  priority: 10
  enabled: true

extraction:
  extractor_type: "pdf_table"
  extractor_class: "YageoTemplateExtractor"

normalization: {}

output:
  fields: ["material", "substance", "weight_mg"]
  include_raw: true
