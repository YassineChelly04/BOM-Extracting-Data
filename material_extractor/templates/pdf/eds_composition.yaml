metadata:
  template_id: eds_composition
  name: EDS Ingredient Composition Table
  version: 1.0.0
  description: EDS ingredient composition table (Murata-style) with CAS and mass
  author: Material Extractor Team
  source_type: pdf
  page_indices:
  - 0
  detection_method: text_pattern
  detection_keywords:
  - EDS
  - Ingredient composition table
  - CAS No.
  header_keywords:
  - Part
  - Substance
  - CAS
  - Compound Mass
  validation_rules:
    min_rows: 2
    min_cols: 7
  priority: 10
  enabled: true
extraction:
  extractor_type: pdf_table
  extractor_class: EDSExtractor
normalization: {}
output:
  fields:
  - material
  - substance
  - weight_mg
  include_raw: true
