metadata:
  template_id: "liteon_composition"
  name: "LITEON Material Composition Declaration"
  version: "1.0.0"
  description: "LITEON material composition declaration with CAS and substance weight"
  author: "Material Extractor Team"
  source_type: "pdf"
  page_indices: [0]
  detection_method: "text_pattern"
  detection_keywords:
    - "MATERIAL COMPOSITION DECLARATION"
    - "CAS No."
    - "LITEON"
  header_keywords:
    - "Element"
    - "CAS"
    - "substance weight"
  validation_rules:
    min_rows: 2
    min_cols: 8
  priority: 10
  enabled: true

extraction:
  extractor_type: "pdf_table"
  extractor_class: "LiteonTemplateExtractor"

normalization: {}

output:
  fields: ["material", "substance", "weight_mg"]
  include_raw: true
